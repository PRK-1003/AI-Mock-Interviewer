<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Mock Interviewer</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <header>

        <h1>🤖 AI Mock Interviewer</h1>

        <p>
            Multi-Agent AI Interview Evaluation Platform
        </p>

    </header>

    <!-- ========================= -->
    <!-- Interview Setup -->
    <!-- ========================= -->

    <section class="setup-card">

        <h2>Interview Setup</h2>

        <div class="form-group">

            <label>Job Role</label>

            <input
                type="text"
                id="jobRole"
                placeholder="Example: AI Engineer">

        </div>

        <div class="form-group">

            <label>Experience Level</label>

            <select id="experience">

                <option value="Fresher">Fresher</option>

                <option value="Junior">Junior</option>

                <option value="Mid">Mid-Level</option>

                <option value="Senior">Senior</option>

            </select>

        </div>

        <div class="form-group">

            <label>Interview Type</label>

            <select id="interviewType">

                <option value="Technical">
                    Technical
                </option>

                <option value="Behavioral">
                    Behavioral
                </option>

                <option value="Mixed">
                    Mixed
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>No. of Questions</label>

            <input
                id="questionCount"
                type="number"
                value="5"
                min="1"
                max="20">

        </div>

        <button id="startBtn">

            Start Interview

        </button>

    </section>

    <!-- ========================= -->
    <!-- Progress -->
    <!-- ========================= -->

    <section id="progressSection"
             class="hidden">

        <div class="progress-header">

            <h3>Interview Progress</h3>

            <span id="progressText">

                Question 1 / 5

            </span>

        </div>

        <div class="progress-bar">

            <div id="progressFill">

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- Question -->
    <!-- ========================= -->

    <section id="questionCard"
             class="hidden">

        <h2>

            Interview Question

        </h2>

        <p id="questionText">

            Loading...

        </p>

        <textarea

            id="candidateAnswer"

            rows="8"

            placeholder="Type your answer here...">

        </textarea>

        <button id="submitBtn">

            Submit Answer

        </button>

    </section>

    <!-- ========================= -->
    <!-- Evaluation -->
    <!-- ========================= -->

    <section id="evaluationCard"
             class="hidden">

        <h2>

            Evaluation

        </h2>

        <div id="evaluationContent">

        </div>

    </section>

    <!-- ========================= -->
    <!-- Final Report -->
    <!-- ========================= -->

    <section id="reportCard"
             class="hidden">

        <h2>

            Final Interview Report

        </h2>

        <div id="dashboard">

        </div>

        <button id="restartBtn">

            Start New Interview

        </button>

    </section>

</div>

<!-- API -->

<script src="js/api.js"></script>

<!-- Dashboard -->

<script src="js/dashboard.js"></script>

<!-- Main -->

<script src="js/app.js"></script>

</body>

</html>
